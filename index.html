<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContentScout — AI Content Originality Scanner | GenLayer Studio</title>
    <meta name="description" content="AI-Powered Content Originality Scanner on GenLayer Studio Blockchain. Contract-authoritative results with fail-closed validation." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>" />
    <script>
      // Anti-devtools: disable right-click, view source shortcuts
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
            (e.ctrlKey && e.key === 'u') ||
            (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'J' || e.key === 'C'))) {
          e.preventDefault();
        }
      });
      // Disable console.log in production
      if (location.hostname !== 'localhost') {
        const noop = () => {};
        console.log = noop; console.debug = noop; console.info = noop;
      }
    </script>
  </head>
  <body class="bg-black text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
